<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Phone log </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<style>

</style>
<body>

<br>
<h1 style="text-align: center">Phone log</h1>
<br>

<div>

        <div>
            <table class="table table-striped">
                <tr>
                    <th>ID</th>
                    <th>日時</th>
                    <th>会社名</th>
                    <th>電話番号</th>
                    <th>名前</th>
                    <th>誰宛</th>
                    <th>内容</th>
                    <th>受けた人</th>
                    <th>入力日時</th>

                </tr>
                <tr>
                    <td th:text="${phonelogdetailed.id}"></td>
                    <td th:text="${phonelogdetailed.callDate + ' (' + phonelogdetailed.callTime} + ')'"></td>
                    <td th:text="${phonelogdetailed.companyName}"></td>
                    <td th:text="${phonelogdetailed.phoneNumber}"></td>
                    <td th:text="${phonelogdetailed.callerName}"></td>
                    <td th:text="${phonelogdetailed.recipient}"></td>
                    <td th:text="${phonelogdetailed.description}"></td>
                    <td th:text="${phonelogdetailed.receiver}"></td>
                    <td th:text="${phonelogdetailed.entryDate}"></td>
                </tr>
            </table>
        </div>

</div>

</body>
</html>
