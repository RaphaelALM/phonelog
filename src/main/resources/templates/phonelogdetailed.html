<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Phone log </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<style>
    h1 {
        text-align: center;
        font-size: 60px;
    }

    th {
        text-align: center;
        font-size: 20px;
    }

    td {
        text-align: center;
    }

</style>
<body>



<!--Navigation bar-->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/phonelog}">
            <img src="/alphalogo.svg" alt="Logo"  class="d-inline-block align-text-top">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link active" aria-current="page" th:href="@{/phonelog}">ホーム</a>
                <a class="nav-link" th:href="@{/phonelog/newlog}">新規登録</a>
                <a class="nav-link" th:href="@{/phonelog/register}">ユーザー登録</a>
            </div>
            <form th:action="@{/logout}" method="post" class="ms-auto" onclick="return confirm('ログアウトしますか？');">
                <span th:text="${username}"></span>
                <button type="submit" class="btn btn-outline-danger">
                    Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<br>
<h1 style="text-align: center">Phone log</h1>
<br>

<div class="input-group mb-3">
    <span class="input-group-text">日時</span>

    <div class="form-control"
         th:text="${phoneLog.callDate}">
    </div>

    <div class="form-control"
         th:text="${phoneLog.callTime}">
    </div>
</div>

<div class="input-group mb-3">
    <span class="input-group-text">電話番号</span>

    <div class="form-control"
         th:text="${phoneLog.phoneNumber}">
    </div>
</div>

<div class="input-group mb-3">
    <span class="input-group-text">所属</span>

    <div class="form-control"
         th:text="${phoneLog.companyName}">
    </div>

    <div class="form-control"
         th:text="${phoneLog.callerName}">
    </div>
</div>

<div class="input-group mb-3">
    <span class="input-group-text">宛先</span>

    <div class="form-control"
         th:text="${phoneLog.recipient}">
    </div>
</div>

<div class="input-group mb-3">
    <span class="input-group-text">内容</span>

    <div class="form-control"
         style="min-height:120px; white-space: pre-wrap;"
         th:text="${phoneLog.description}">
    </div>
</div>

<div class="input-group mb-3">
    <span class="input-group-text">受けた人</span>

    <div class="form-control"
         th:text="${phoneLog.receiver}">
    </div>
</div>

<div class="mt-3">
    <a th:href="@{/phonelog/{id}/edit(id=${phoneLog.id})}"
       class="btn btn-outline-primary">
        編集
    </a>

    <a th:href="@{/phonelog}"
       class="btn btn-outline-secondary">
        戻る
    </a>
</div>


</body>


</html>
