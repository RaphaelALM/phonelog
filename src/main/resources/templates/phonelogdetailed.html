<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phone log </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<style>
    table {
      border-collapse: collapse;
      border: 2px solid rgb(140 140 140);
      font-family: sans-serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    th,
    td {
      border: 1px solid rgb(160 160 160);
      padding: 8px 10px;
    }

    td:last-of-type {
      text-align: center;
    }

</style>
<body>
<h1>Phone logs</h1>
<div>

        <div>
            <table class="table">
                <tr>
                    <th>ID</th>
                    <th>日時</th>
                    <th>会社名</th>
                    <th>電話番号</th>
                    <th>名前</th>
                    <th>誰宛</th>
                    <th>内容</th>
                    <th>受けた人</th>
                    <th>入力日時</th>

                </tr>
                <tr>
                    <td th:text="${phonelogdetailed.id}"></td>
                    <td th:text="${phonelogdetailed.callDate + ' (' + phonelogdetailed.callTime} + ')'"></td>
<!--                    <td th:text="${phonelogdetailed.callTime}"></td>-->
                    <td th:text="${phonelogdetailed.companyName}"></td>
                    <td th:text="${phonelogdetailed.phoneNumber}"></td>
                    <td th:text="${phonelogdetailed.callerName}"></td>
                    <td th:text="${phonelogdetailed.recipient}"></td>
                    <td th:text="${phonelogdetailed.description}"></td>
                    <td th:text="${phonelogdetailed.receiver}"></td>
                    <td th:text="${phonelogdetailed.entryDate}"></td>
                </tr>
            </table>
        </div>

</div>

</body>
</html>
