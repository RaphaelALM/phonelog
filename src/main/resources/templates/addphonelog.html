      <h1 style="text-align: center">登録フォーム</h1>
    <br>

    <form th:action="@{/phonelog}" method="post">

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon1">日時</span>
        <input type="date" class="form-control" aria-describedby="basic-addon1" name="callDate" id="callDate">
        <input type="time" class="form-control" aria-describedby="basic-addon1" name="callTime" id="callTime">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon2">電話番号</span>
        <input type="tel" class="form-control" name="phoneNumber" id="phoneNumber"><br>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon3">所属</span>
        <input type="text" class="form-control" name="companyName" id="companyName" placeholder="会社名">
        <input type="text" class="form-control" name="callerName" id="callerName" placeholder="名前">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon4">宛先</span>
        <input type="text" class="form-control" name="recipient" id="recipient"><br>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon5">内容</span>
        <textarea class="form-control" name="description" id="description" rows="4"></textarea>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon6">受けた人</span>
        <input type="text" class="form-control" name="receiver" id="receiver"><br>
      </div>

      <button type="submit" class="btn btn-success">追加</button>
