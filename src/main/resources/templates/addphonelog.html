<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Phone log </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<style>

</style>
<body>
<h1>登録フォーム</h1>
<div>
  <form th:action="@{/phonelog}" method="post">
    <label>日にち</label><br>
    <input type="date" name="callDate" id="callDate"><br>

    <label>時間</label><br>
    <input type="time" name="callTime" id="callTime"><br>

    <label>電話番号</label><br>
    <input type="text" name="phoneNumber" id="phoneNumber"><br>

    <label>会社名</label><br>
    <input type="text" name="companyName" id="companyName"><br>

    <label>名前</label><br>
    <input type="text" name="callerName" id="callerName"><br>

    <label>あて先</label><br>
    <input type="text" name="recipient" id="recipient"><br>

    <label>内容</label><br>
    <input type="text" name="description" id="description" style="width: 300px; height: 60px"><br>

    <label>受けた人</label><br>
    <input type="text" name="receiver" id="receiver"><br>

    <button type="submit">追加</button>
  </form>

  <div>

  </div>

</div>

</body>
</html>
