<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Login</h2>

<form th:action="@{/login}" method="post">

  <input type="text"
         name="name"
         placeholder="username">

  <input type="password"
         name="password"
         placeholder="password">

  <button type="submit">
    Log in
  </button>

</form>

</body>
</html>
