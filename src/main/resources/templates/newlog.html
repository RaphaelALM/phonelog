<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Phone log </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style>
  h1 {
      text-align: center;
      font-size: 60px;
  }

  th {
      text-align: center;
      font-size: 20px;
  }

  td {
      text-align: center;
  }

</style>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" th:href="@{/phonelog}">
      <img src="/alphalogo.svg" alt="Logo"  class="d-inline-block align-text-top">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
      <div class="navbar-nav">
        <a class="nav-link" aria-current="page" th:href="@{/phonelog}">ホーム</a>
        <a class="nav-link active" th:href="@{/phonelog/newlog}">新規登録</a>
      </div>
    </div>
  </div>
</nav>
    <br>
      <h1 style="text-align: center">登録フォーム</h1>
    <br>

    <form th:action="@{/phonelog}" th:object="${phoneLog}" method="post">

      <div class="input-group mb-3">
        <span class="input-group-text">日時</span>

        <input type="date" class="form-control" th:field="*{callDate}" th:classappend="${#fields.hasErrors('callDate')} ? 'is-invalid' : ''">
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('callDate')}"
             th:errors="*{callDate}">
        </div>

        <input type="time" class="form-control" th:field="*{callTime}" th:classappend="${#fields.hasErrors('callTime')} ? 'is-invalid' : ''">
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('callTime')}"
             th:errors="*{callTime}">
        </div>
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text" >電話番号</span>
        <input type="tel" class="form-control" id="phoneNumber" th:field="*{phoneNumber}" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid' : ''"><br>


        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('phoneNumber')}"
             th:errors="*{phoneNumber}">
        </div>
      </div>


      <div class="input-group mb-3">
        <span class="input-group-text">所属</span>

        <input type="text" class="form-control" id="companyName" placeholder="会社名" th:field="*{companyName}" th:classappend="${#fields.hasErrors('companyName')} ? 'is-invalid' : ''">
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('companyName')}"
             th:errors="*{companyName}">
        </div>

        <input type="text" class="form-control" id="callerName" placeholder="名前" th:field="*{callerName}" th:classappend="${#fields.hasErrors('callerName')} ? 'is-invalid' : ''">
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('callerName')}"
             th:errors="*{callerName}">
        </div>

      </div>

      <div class="input-group mb-3">
        <span class="input-group-text">宛先</span>

        <input type="text" class="form-control" id="recipient" th:field="*{recipient}" th:classappend="${#fields.hasErrors('recipient')} ? 'is-invalid' : ''"><br>
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('recipient')}"
             th:errors="*{recipient}">
        </div>

      </div>

      <div class="input-group mb-3">
        <span class="input-group-text">内容</span>

        <textarea class="form-control" id="description" rows="4" th:field="*{description}" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"></textarea>
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('description')}"
             th:errors="*{description}">
        </div>

      </div>

      <div class="input-group mb-3">
        <span class="input-group-text">受けた人</span>

        <input type="text" class="form-control" id="receiver" th:field="*{receiver}" th:classappend="${#fields.hasErrors('receiver')} ? 'is-invalid' : ''"><br>
        <div class="invalid-feedback"
             th:if="${#fields.hasErrors('receiver')}"
             th:errors="*{receiver}">
        </div>

      </div>

<!--      Confirm button-->
        <button type="submit" class="btn btn-outline-success" onclick="return confirm('追加しますか？');">
          追加
        </button>
      <!--      Clear button-->
      <button type="reset"
         class="btn btn-outline-danger"
         onclick="return confirm('クリアしますか？');">
        クリア
      </button>

    </form>



</body>
</html>
