<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Phone log </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<style>
    h1 {
        text-align: center;
        font-size: 60px;
    }

    th {
        text-align: center;
        font-size: 20px;
    }

    td {
        text-align: center;
    }

</style>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/phonelog}">
            <img src="/alphalogo.svg" alt="Logo"  class="d-inline-block align-text-top">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
                <a class="nav-link" aria-current="page" th:href="@{/phonelog}">Home</a>
                <a class="nav-link active" th:href="@{/phonelog/newlog}">Add</a>
                <a class="nav-link" th:href="@{/phonelog/1}">test</a>
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
            </div>
        </div>
    </div>
</nav>

<br>
<h1 style="text-align: center">更新フォーム</h1>
<br>

<form th:action="@{/phonelog/update}" th:object="${phoneLog}" method="post">

    <input type="hidden" th:field="*{id}">

    <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon1">日時</span>
        <input type="date" class="form-control" aria-describedby="basic-addon1"  th:field="*{callDate}">
        <input type="time" class="form-control" aria-describedby="basic-addon1"  th:field="*{callTime}">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon2">電話番号</span>
        <input type="tel" class="form-control" th:field="*{phoneNumber}"><br>
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon3">所属</span>
        <input type="text" class="form-control" placeholder="会社名" th:field="*{companyName}">
        <input type="text" class="form-control" placeholder="名前" th:field="*{callerName}">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon4">宛先</span>
        <input type="text" class="form-control" th:field="*{recipient}"><br>
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon5">内容</span>
        <textarea class="form-control" rows="4" th:field="*{description}"></textarea>
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text" id="basic-addon6">受けた人</span>
        <input type="text" class="form-control" th:field="*{receiver}"><br>
    </div>

    <button type="submit" class="btn btn-success">更新</button>


</form>

</body>
</html>
